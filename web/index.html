<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<title>Plan de Estudios - Ingeniería en Agronomía</title>
		<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { overflow: hidden; height: 100vh; font-family: sans-serif; }
		#split { width: 100vw; height: 100vh; }
		#svg-panel {
			background: white;
			display: flex;
			justify-content: center;
			align-items: center;
			overflow: auto;
			position: relative;
		}
		#svg-panel object { width: 100%; height: 100%; display: block; }
		#table-panel { background: #f5f5f5; padding: 15px; overflow: auto; }
		.gutter.gutter-vertical { background: #4a90e2; cursor: row-resize; height: 6px !important; }
		.gutter.gutter-vertical:hover { background: #357abd; }
		</style>
		<link rel="stylesheet" href="simple-table.css">
		<link rel="stylesheet" href="simple-details.css">
		<script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
		<script src="simple-table.js"></script>
		<script src="simple-details.js"></script>
		<script src="svg-controls.js"></script>
	</head>
	<body>
		<div id="split">
			<div id="svg-panel">
				<object type="image/svg+xml" data="red_cursos.svg"></object>
			</div>
			<div id="table-panel">
				<div id="my-table"></div>
			</div>
		</div>
		<script>
		Split(['#svg-panel', '#table-panel'], {
			direction: 'vertical',
			sizes: [55, 45],
			gutterSize: 6
		});

		// Definición de las columnas de acuerdo a la metadata v:table del SVG
		const columns = [
			{ field: 'sigla', title: 'Sigla', filter: 'text', width: '12%' },
			{ field: 'nombre', title: 'Nombre del Curso', filter: 'text', width: '38%' },
			{ field: 'semestre', title: 'Semestre', filter: 'text', width: '12%' },
			{ field: 'creditos', title: 'Créditos', filter: 'text', width: '12%' },
			{ field: 'horas', title: 'Horas', filter: 'text', width: '11%' },
			{ field: 'area', title: 'Área Académica', filter: 'text', width: '15%' }
		];

		const details = new SimpleDetail({ title: 'Detalles del Curso' });
		let table = null;

		const rowToSvgId = new Map();
		const svgToRowId = new Map();

		// Función que mandará a llamar de forma automática la librería del profesor
		window.setupODViz = function(dataset, svgControl) {
			
			dataset.rows.forEach(row => {
				const sigla = row.data.sigla;
				const svgId = `curso-${sigla}`; // Mapea exactamente con el id="curso-XXXX" de tu v:table

				rowToSvgId.set(row._rowId, svgId);
				svgToRowId.set(svgId, row._rowId);
			});

			table = new SimpleTable('my-table', {
				data: dataset.rows.map(r => ({ _rowId: r._rowId, ...r.data })),
				columns: columns,
				selectable: true,
				onRowSelect: (selectedRows) => {
					if (!svgControl) return;
					svgControl.clearSelection();
					selectedRows.forEach(row => {
						const svgId = rowToSvgId.get(row._rowId);
						if (svgId) svgControl.select(svgId, true);
					});
				},
				// Tarea 5: El filtrado de la tabla oculta y atenúa dinámicamente elementos en el SVG
				onFilter: (filteredData) => {
					if (!svgControl) return;
					
					const obj = document.querySelector('object');
					if (!obj || !obj.contentDocument) return;
					const svgDoc = obj.contentDocument;

					const visibleRowIds = new Set(filteredData.map(r => String(r._rowId)));

					dataset.rows.forEach(row => {
						const svgId = rowToSvgId.get(row._rowId);
						const element = svgDoc.getElementById(svgId);
						
						if (element) {
							if (visibleRowIds.has(String(row._rowId))) {
								element.style.opacity = '1';
								element.style.pointerEvents = 'auto';
							} else {
								element.style.opacity = '0.15'; 
								element.style.pointerEvents = 'none';
							}
						}
					});
				}
			});

			svgControl.setCallback('select', (svgElement) => {
				if (!table) return;
				table.selectedRows.clear();
				if (svgElement) {
					const rowId = svgToRowId.get(svgElement.id);
					if (rowId) {
						const targetRow = table.data.find(row => String(row._rowId) === String(rowId));
						if (targetRow) table.selectedRows.add(targetRow);
					}
				}
				table.render();
			});

			svgControl.setCallback('multiSelect', (svgElements) => {
				if (!table) return;
				table.selectedRows.clear();
				svgElements.forEach(el => {
					if (el && svgToRowId.has(el.id)) {
						const rowId = svgToRowId.get(el.id);
						const targetRow = table.data.find(row => String(row._rowId) === String(rowId));
						if (targetRow && !table.selectedRows.has(targetRow)) {
							table.selectedRows.add(targetRow);
						}
					}
				});
				table.render();
				if (typeof table.options.onRowSelect === 'function') {
					table.options.onRowSelect(Array.from(table.selectedRows));
				}
			});

			svgControl.setCallback('dblclick', (svgElement) => {
				if (!table || !svgElement) return;
				const rowId = svgToRowId.get(svgElement.id);
				if (!rowId) return;
				const row = table.data.find(r => String(r._rowId) === String(rowId));
				if (row) details.show(row, columns);
			});
		};
		</script>
	</body>
</html>
